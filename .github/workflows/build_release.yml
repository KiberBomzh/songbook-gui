name: Build Release

on:
    workflow_dispatch:
    push:
        branches: [master]
        tags: ["[0-9]+.[0-9]+.[0-9]+"]

jobs:
    build-android:
        name: Build for Android
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Java Development Kit
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "21"

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "3.x"
                  channel: "stable"

            - name: Flutter pub get
              run: flutter pub get

            - name: Download Android Keystore
              run: |
                  mkdir -p ~/.android
                  wget -O ~/.android/debug.keystore "${{ secrets.ANDROID_DBG_KEY_URL }}"
              shell: bash

            - name: Create debug key.properties
              run: |
                  echo "storeFile=$HOME/.android/debug.keystore" > android/key.properties
                  echo "storePassword=android" >> android/key.properties
                  echo "keyPassword=android" >> android/key.properties
                  echo "keyAlias=androiddebugkey" >> android/key.properties

            - name: Build Android APK
              run: |
                  flutter build apk
                  flutter build apk --split-per-abi
              env:
                  KEYSTORE_PATH: ~/.android/debug.keystore
                  KEYSTORE_PASSWORD: android
                  KEY_ALIAS: androiddebugkey
                  KEY_PASSWORD: android

            - name: Check .android
              run: ls ~/.android

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: songbook-android
                  path: |
                      build/app/outputs/flutter-apk/*
                      ~/.android/*

    build-linux:
        name: Build for Linux
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "3.x"
                  channel: "stable"

            - name: Install Linux dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

            - name: Install AppImageTool
              run: |
                  wget -q -O appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
                  chmod +x appimagetool
                  sudo mv appimagetool /usr/local/bin/

            - name: Flutter pub get
              run: flutter pub get

            - name: Build release
              run: flutter build linux

            - name: Set AppDir
              run: |
                  cp -r linux/AppDir build/
                  cp assets/icon.png build/AppDir/
                  cp -r build/linux/x64/release/bundle/* build/AppDir/

            - name: Build AppImage
              run: appimagetool -n build/AppDir

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: songbook-linux-x86_64.AppImage
                  path: songbook-x86_64.AppImage
                  if-no-files-found: error

    build-windows:
        name: Build for Windows
        runs-on: windows-2022
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: x86_64-pc-windows-msvc

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "3.x"
                  channel: "stable"

            - name: Flutter pub get
              run: flutter pub get

            - name: Download Icelandic language for Inno Setup
              run: |
                  $langDir = "C:\Program Files (x86)\Inno Setup 6\Languages"
                  Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/refs/heads/main/Files/Languages/Unofficial/Icelandic.isl" -OutFile "$langDir\Icelandic.isl"

            - name: Create Windows installer with Inno Setup
              run: dart run inno_bundle

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: songbook-windows-x86_64.exe
                  path: build/windows/x64/Installer/Release/Songbook-x86_64-*-Installer.exe
                  if-no-files-found: error
