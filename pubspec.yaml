name: songbook
description: "An app for song's text and chords"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.2.1+1
environment:
  sdk: ^3.11.4
dependencies:
  flutter:
    sdk: flutter
  rust_lib_songbook:
    path: rust_builder
  flutter_rust_bridge: 2.12.0
  path_provider: ^2.1.5
  flutter_expandable_fab: ^2.5.2
  freezed_annotation: ^3.1.0
  shared_preferences: ^2.5.5
  provider: ^6.1.5+1
  flex_color_picker: ^3.8.0
  file_picker: ^11.0.2
  share_plus: ^12.0.2
  wakelock_plus: ^1.5.2
  restart_app: ^1.8.3
  linked_scroll_controller: ^0.2.0
  drag_and_drop_lists: ^0.4.2
dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  freezed: ^3.2.5
  build_runner: ^2.13.1
  inno_bundle: ^0.11.2

flutter_launcher_icons:
  android: true
  image_path: "assets/icon.png"
  adaptive_icon_foreground: "assets/icon/foreground.png"
  adaptive_icon_background: "#FFFFFF"
  min_sdk_android: 21
  windows:
    generate: true
    icon_size: 256

inno_bundle:
  id: b5dbf060-6056-11f1-9a6a-d5b3fcc71fac
  name: songbook
  publisher: KiberBomzh

flutter:
  uses-material-design: true
  fonts:
    - family: CascadiaMono
      fonts:
        - asset: assets/fonts/CascadiaMono/CascadiaMono-VariableFont_wght.ttf
        - asset: assets/fonts/CascadiaMono/CascadiaMono-Italic-VariableFont_wght.ttf
          style: italic
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-VariableFont_wght.ttf
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-Italic-VariableFont_wght.ttf
          style: italic
    - family: VictorMono
      fonts:
        - asset: assets/fonts/VictorMono/VictorMono-VariableFont_wght.ttf
        - asset: assets/fonts/VictorMono/VictorMono-Italic-VariableFont_wght.ttf
          style: italic
    - family: Lilex
      fonts:
        - asset: assets/fonts/Lilex/Lilex-VariableFont_wght.ttf
        - asset: assets/fonts/Lilex/Lilex-Italic-VariableFont_wght.ttf
          style: italic
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono/RobotoMono-VariableFont_wght.ttf
        - asset: assets/fonts/RobotoMono/RobotoMono-Italic-VariableFont_wght.ttf
          style: italic
    - family: FiraCode
      fonts:
        - asset: assets/fonts/FiraCode-VariableFont_wght.ttf
    - family: PTMono
      fonts:
        - asset: assets/fonts/PTMono-Regular.ttf
